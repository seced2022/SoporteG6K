<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Rally</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  margin:0;
  padding:20px;
}
.menu{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.btn{
  background:#e10600;
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
.panel{
  display:none;
  background:#1b1b1b;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}
.panel.active{ display:block; }
input,select{ padding:6px; margin:4px; }
table{ width:100%; border-collapse:collapse; margin-top:10px; }
th,td{ border:1px solid #333; padding:6px; text-align:center; }
.repetido{ background:#ff9800 !important; }

.small{ font-size:12px; opacity:.9; }
.status{
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  background:#0f2a12;
  border:1px solid #2f6b3a;
  white-space:pre-wrap;
}
.status.err{
  background:#2a0f0f;
  border-color:#8a2d2d;
}
</style>
</head>

<body>

<h2>🏁 Control Rally</h2>

<div class="menu">
  <button class="btn" onclick="mostrarPanel('crearRally')">Crear Rally</button>
  <button class="btn" onclick="mostrarPanel('inscritos')">Inscritos</button>
  <button class="btn" onclick="mostrarPanel('tiempos')">Tiempos</button>
</div>

<!-- ================= CREAR RALLY ================= -->
<div id="crearRally" class="panel">
  <h3>Crear Rally</h3>

  ID Rally:
  <input id="nuevoID" placeholder="Ej: ID91">

  Nº Tramos:
  <input id="numTramos" type="number" min="1" value="1">

  <button class="btn" onclick="crearRally()">Confirmar</button>
  <button class="btn" onclick="testEscritura()">Test escritura</button>

  <div id="estadoRally" class="status small" style="display:none;"></div>
</div>

<!-- ================= INSCRITOS ================= -->
<div id="inscritos" class="panel">
  <h3>Inscritos</h3>

  ID:
  <select id="idInscritos"></select>

  Buscar dorsal:
  <input id="buscarDorsal" oninput="filtrarInscritos()">

  <br><br>

  Nº <input id="i_num" size="4">
  Concursante <input id="i_con">
  Piloto <input id="i_pil">
  Copiloto <input id="i_cop">
  Vehículo <input id="i_veh">
  GR.CERA <input id="i_gcera" size="6">
  CAT.CERA <input id="i_ccera" size="6">
  GR.CARA <input id="i_gcara" size="6">
  CAT.CARA <input id="i_ccara" size="6">
  Tracción <input id="i_trac" size="6">
  Trofeo <input id="i_trof" size="6">
  Prioridad <input id="i_prio" size="6">

  <br><br>
  <button class="btn" onclick="guardarInscrito()">Guardar</button>
  <span id="estadoInscritos" class="small"></span>

  <table id="tablaInscritos">
    <thead>
      <tr>
        <th>Nº</th>
        <th>Piloto</th>
        <th>Copiloto</th>
        <th>Vehículo</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- ================= TIEMPOS ================= -->
<div id="tiempos" class="panel active">
  <h3>Tiempos</h3>

  ID:
  <select id="selectorID"></select>

  Tramo:
  <select id="selectorTramo"></select>

  <table id="tablaTiempos">
    <thead>
      <tr>
        <th>Nº</th>
        <th>Piloto</th>
        <th>Copiloto</th>
        <th>Tiempo</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="small" id="estadoTiempos"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwmQakDh0mTs9QFq135I8LD1vG0-FNVo0",
  authDomain: "heideggerp6v2.firebaseapp.com",
  databaseURL: "https://heideggerp6v2-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "heideggerp6v2",
  storageBucket: "heideggerp6v2.appspot.com",
  messagingSenderId: "186503733",
  appId: "1:186503733:web:ac4e03f579a8e101f5177c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const $ = (id)=>document.getElementById(id);

let currentID = null;
let inscritosCache = {};
let datosProcesados = {}; // {TC: {dorsal:{S,LL}}}

// ================= PANEL =================
window.mostrarPanel = function(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

function setEstado(msg, isErr=false){
  const el = $("estadoRally");
  el.style.display = "block";
  el.classList.toggle("err", !!isErr);
  el.textContent = msg;
}

// ================= CARGAR IDS (EN VIVO) =================
onValue(ref(db, "IDs"), (snap)=>{
  const data = snap.val() || {};
  const ids = Object.keys(data);

  const selT = $("selectorID");
  const selI = $("idInscritos");
  const prevT = selT.value;
  const prevI = selI.value;

  selT.innerHTML = "";
  selI.innerHTML = "";

  ids.forEach(id=>{
    const o1=document.createElement("option");
    o1.value=id; o1.textContent=id;
    selT.appendChild(o1);

    const o2=document.createElement("option");
    o2.value=id; o2.textContent=id;
    selI.appendChild(o2);
  });

  if(prevT && data[prevT]) selT.value = prevT;
  if(prevI && data[prevI]) selI.value = prevI;

  if(!selT.value && ids.length) selT.value = ids[0];
  if(!selI.value && ids.length) selI.value = ids[0];

  if(selT.value && selT.value !== currentID){
    currentID = selT.value;
    engancharID(currentID);
  } else if(selT.value && !currentID){
    currentID = selT.value;
    engancharID(currentID);
  }
});

$("selectorID").addEventListener("change", ()=>{
  currentID = $("selectorID").value;
  engancharID(currentID);
});
$("idInscritos").addEventListener("change", ()=>{
  cargarInscritos($("idInscritos").value);
});
$("selectorTramo").addEventListener("change", pintarTablaTiempos);

function engancharID(id){
  onValue(ref(db, `IDs/${id}/tramos`), (snap)=>{
    const tramosData = snap.val() || {};
    cargarSelectorTramos(tramosData);
    procesarTramos(tramosData);
    pintarTablaTiempos();
  });

  onValue(ref(db, `IDs/${id}/inscritos`), (snap)=>{
    inscritosCache = snap.val() || {};
    pintarTablaTiempos();
    if($("idInscritos").value === id) pintarTablaInscritos();
  });

  if($("idInscritos").value === id) cargarInscritos(id);
}

// ================= TEST ESCRITURA =================
window.testEscritura = async function(){
  try{
    const p = `debug_web_write/${Date.now()}`;
    await set(ref(db, p), { ok:true, t: Date.now() });
    setEstado("✅ Test escritura OK\nEscrito en:\n"+p, false);
  }catch(e){
    console.error(e);
    setEstado("❌ Test escritura FALLÓ\n"+(e?.message || e), true);
  }
};

// ================= CREAR RALLY (2 FASES: SIEMPRE CREA EL ID) =================
window.crearRally = async function(){
  const id = $("nuevoID").value.trim();
  const num = parseInt($("numTramos").value);

  if(!id || !num || num < 1){
    alert("Pon un ID y nº tramos válido");
    return;
  }

  try{
    const idRef = ref(db, "IDs/"+id);
    const snap = await get(idRef);
    if(snap.exists()){
      alert("Ese ID ya existe");
      return;
    }

    // FASE 1: crear ID mínimo (como tu versión que SÍ funcionaba)
    await set(idRef, {
      creado: Date.now(),
      inscritos: {},
      tramos: {}
    });

    // FASE 2: intentar crear estructura completa por rutas
    const updates = {};
    for(let i=1;i<=num;i++){
      const tc = `TC${i}`;
      updates[`IDs/${id}/tramos/${tc}/puestos/S/tiempos`] = {};
      updates[`IDs/${id}/tramos/${tc}/puestos/LL/tiempos`] = {};
    }

    try{
      await update(ref(db), updates);
      setEstado(`✅ Rally creado COMPLETO\nIDs/${id}\nTramos: ${num}\n(con puestos S/LL y tiempos)`, false);
    }catch(e2){
      // si falla esta fase, el ID ya existe (no pierdes nada)
      console.error("ERROR fase2 estructura:", e2);
      setEstado(
        "⚠️ ID creado, pero NO se pudo crear la estructura completa.\n"+
        "Esto ES reglas/validación.\n\n"+
        "✅ ID creado: IDs/"+id+"\n"+
        "❌ Error estructura: "+(e2?.message || e2),
        true
      );
    }

    $("nuevoID").value = "";
    $("selectorID").value = id;
    $("idInscritos").value = id;
    currentID = id;
    engancharID(id);
    mostrarPanel("tiempos");

  }catch(e){
    console.error("ERROR crearRally:", e);
    setEstado("❌ NO se pudo crear el ID\n"+(e?.message || e), true);
  }
};

// ================= TRAMOS SELECTOR =================
function cargarSelectorTramos(tramosData){
  const sel = $("selectorTramo");
  const prev = sel.value;

  sel.innerHTML = "";
  const all = document.createElement("option");
  all.value = "TODOS"; all.textContent = "TODOS";
  sel.appendChild(all);

  Object.keys(tramosData).forEach(tc=>{
    const opt = document.createElement("option");
    opt.value = tc; opt.textContent = tc;
    sel.appendChild(opt);
  });

  if(prev && [...sel.options].some(o=>o.value===prev)) sel.value = prev;
  else sel.value = "TODOS";
}

// ================= PROCESAR TRAMOS (S/LL) =================
function procesarTramos(tramosData){
  datosProcesados = {};
  Object.keys(tramosData).forEach(tc=>{
    const puestos = tramosData[tc]?.puestos;
    if(!puestos) return;

    ["S","LL"].forEach(tipo=>{
      const tiempos = puestos?.[tipo]?.tiempos;
      if(!tiempos) return;

      Object.values(tiempos).forEach(reg=>{
        const dorsal = reg?.dorsal;
        const hora = reg?.tiempo;
        const puesto = reg?.puesto;

        if(!dorsal || !hora) return;
        if(puesto !== "S" && puesto !== "LL") return;

        if(!datosProcesados[tc]) datosProcesados[tc] = {};
        if(!datosProcesados[tc][dorsal]) datosProcesados[tc][dorsal] = {S:null, LL:null};
        datosProcesados[tc][dorsal][puesto] = hora;
      });
    });
  });
}

// ================= TABLA TIEMPOS =================
function pintarTablaTiempos(){
  const tbody = $("tablaTiempos").querySelector("tbody");
  tbody.innerHTML = "";

  const tramoSel = $("selectorTramo").value || "TODOS";
  const filas = [];

  Object.keys(datosProcesados).forEach(tc=>{
    if(tramoSel !== "TODOS" && tc !== tramoSel) return;

    Object.keys(datosProcesados[tc]).forEach(dorsal=>{
      const s = datosProcesados[tc][dorsal].S;
      const ll = datosProcesados[tc][dorsal].LL;
      if(!s || !ll) return;

      const t1 = new Date("1970-01-01T"+s);
      const t2 = new Date("1970-01-01T"+ll);
      const diff = t2 - t1;
      if(diff < 0) return;

      filas.push({ dorsal, tiempoMS: diff });
    });
  });

  filas.sort((a,b)=>a.tiempoMS-b.tiempoMS);

  filas.forEach(f=>{
    const d = inscritosCache?.[f.dorsal] || {};
    const piloto = d.piloto || "-";
    const copiloto = d.copiloto || "-";

    let diff = f.tiempoMS;
    const ms = diff % 1000; diff = Math.floor(diff/1000);
    const ss = diff % 60; diff = Math.floor(diff/60);
    const mm = diff % 60;
    const hh = Math.floor(diff/60);

    const tiempo =
      String(hh).padStart(2,"0")+":"+
      String(mm).padStart(2,"0")+":"+
      String(ss).padStart(2,"0")+"."+
      String(ms).padStart(3,"0");

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${f.dorsal}</td>
      <td>${piloto}</td>
      <td>${copiloto}</td>
      <td><b>${tiempo}</b></td>
    `;
    tbody.appendChild(tr);
  });

  $("estadoTiempos").textContent = `Mostrando ${filas.length} tiempos (S+LL completos).`;
}

// ================= INSCRITOS =================
async function cargarInscritos(id){
  const snap = await get(ref(db, `IDs/${id}/inscritos`));
  inscritosCache = snap.val() || {};
  pintarTablaInscritos();
}

function pintarTablaInscritos(){
  const tbody = $("tablaInscritos").querySelector("tbody");
  tbody.innerHTML = "";

  const filtro = ($("buscarDorsal").value || "").toLowerCase();

  Object.keys(inscritosCache).forEach(num=>{
    const ins = inscritosCache[num] || {};
    const texto = `${num} ${ins.piloto||""} ${ins.copiloto||""} ${ins.vehiculo||""}`.toLowerCase();
    if(filtro && !texto.includes(filtro)) return;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${num}</td>
      <td>${ins.piloto||""}</td>
      <td>${ins.copiloto||""}</td>
      <td>${ins.vehiculo||""}</td>
    `;
    tbody.appendChild(tr);
  });
}

window.filtrarInscritos = function(){ pintarTablaInscritos(); };

window.guardarInscrito = async function(){
  const id = $("idInscritos").value;
  const num = $("i_num").value.trim();
  if(!id || !num){ alert("Falta ID o Nº"); return; }

  const data = {
    concursante: $("i_con").value,
    piloto: $("i_pil").value,
    copiloto: $("i_cop").value,
    vehiculo: $("i_veh").value,
    gr_cera: $("i_gcera").value,
    cat_cera: $("i_ccera").value,
    gr_cara: $("i_gcara").value,
    cat_cara: $("i_ccara").value,
    traccion: $("i_trac").value,
    trofeo: $("i_trof").value,
    prioridad: $("i_prio").value
  };

  await set(ref(db, `IDs/${id}/inscritos/${num}`), data);

  $("estadoInscritos").textContent = "✅ Guardado";
  ["i_num","i_con","i_pil","i_cop","i_veh","i_gcera","i_ccera","i_gcara","i_ccara","i_trac","i_trof","i_prio"].forEach(x=>$(x).value="");

  await cargarInscritos(id);
};

// ================= INICIO =================
mostrarPanel("tiempos");
</script>

</body>
</html>
