<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Rally</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  margin:0;
  padding:20px;
}

.menu{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.btn{
  background:#e10600;
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.panel{
  display:none;
  background:#1b1b1b;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

.panel.active{
  display:block;
}

input,select{
  padding:6px;
  margin:4px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #333;
  padding:6px;
  text-align:center;
}

.repetido{
  background:#ff9800 !important;
}
</style>
</head>

<body>

<h2>🏁 Control Rally</h2>

<div class="menu">
  <button class="btn" onclick="mostrarPanel('crearRally')">Crear Rally</button>
  <button class="btn" onclick="mostrarPanel('inscritos')">Inscritos</button>
  <button class="btn" onclick="mostrarPanel('tiempos')">Tiempos</button>
</div>

<!-- ================= CREAR RALLY ================= -->
<div id="crearRally" class="panel">
  <h3>Crear Rally</h3>

  ID Rally:
  <input id="nuevoID">

  Nº Tramos:
  <input id="numTramos" type="number" min="1" value="1">

  <button class="btn" onclick="crearRally()">Confirmar</button>

  <div id="estadoRally"></div>
</div>

<!-- ================= INSCRITOS ================= -->
<div id="inscritos" class="panel">
  <h3>Inscritos</h3>

  ID:
  <select id="idInscritos"></select>

  Buscar dorsal:
  <input id="buscarDorsal" oninput="filtrarInscritos()">

  <br><br>

  Nº <input id="i_num" size="4">
  Piloto <input id="i_pil">
  Copiloto <input id="i_cop">
  Vehículo <input id="i_veh">

  <br><br>
  <button class="btn" onclick="guardarInscrito()">Guardar</button>

  <table id="tablaInscritos">
    <thead>
      <tr>
        <th>Nº</th>
        <th>Piloto</th>
        <th>Copiloto</th>
        <th>Vehículo</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- ================= TIEMPOS ================= -->
<div id="tiempos" class="panel active">
  <h3>Tiempos</h3>

  ID:
  <select id="selectorID"></select>

  Tramo:
  <select id="selectorTramo"></select>

  <table id="tablaTiempos">
    <thead>
      <tr>
        <th>Nº</th>
        <th>Piloto</th>
        <th>Copiloto</th>
        <th>Tiempo</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- ================= FIREBASE ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  update,
  onValue,
  get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwmQakDh0mTs9QFq135I8LD1vG0-FNVo0",
  authDomain: "heideggerp6v2.firebaseapp.com",
  databaseURL: "https://heideggerp6v2-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "heideggerp6v2",
  storageBucket: "heideggerp6v2.appspot.com",
  messagingSenderId: "186503733",
  appId: "1:186503733:web:ac4e03f579a8e101f5177c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= PANEL ================= */

window.mostrarPanel = function(id){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
};

/* ================= CREAR RALLY ================= */

window.crearRally = async function(){

  const id = document.getElementById("nuevoID").value.trim();
  const num = parseInt(document.getElementById("numTramos").value);

  if(!id || !num || num < 1){
    alert("Pon un ID válido y nº de tramos");
    return;
  }

  const idRef = ref(db,"IDs/"+id);
  const snap = await get(idRef);

  if(snap.exists()){
    alert("Ese ID ya existe");
    return;
  }

  // 1️⃣ Crear ID base (esto ya te funcionaba)
  await set(idRef,{
    creado: Date.now(),
    inscritos: {}
  });

  // 2️⃣ Crear estructura completa de tramos
  const updates = {};
  for(let i=1;i<=num;i++){
    const tc = "TC"+i;

    updates[`IDs/${id}/tramos/${tc}/puestos/S/tiempos`] = {};
    updates[`IDs/${id}/tramos/${tc}/puestos/LL/tiempos`] = {};
  }

  await update(ref(db), updates);

  document.getElementById("estadoRally").innerHTML="✅ Rally creado correctamente";
  document.getElementById("nuevoID").value="";
};

/* ================= CARGAR IDS ================= */

onValue(ref(db,"IDs"), snap=>{
  if(!snap.exists()) return;

  const ids = Object.keys(snap.val());

  const sel1 = document.getElementById("selectorID");
  const sel2 = document.getElementById("idInscritos");

  sel1.innerHTML="";
  sel2.innerHTML="";

  ids.forEach(id=>{
    sel1.innerHTML+=`<option>${id}</option>`;
    sel2.innerHTML+=`<option>${id}</option>`;
  });
});

</script>
</body>
</html>
