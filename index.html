<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Rally V1</title>

<style>

body{
  font-family: Arial;
  background:#111;
  color:#fff;
  margin:0;
  padding:20px;
}

.menu{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.btn{
  background:#e10600;
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.panel{
  display:none;
  background:#1b1b1b;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

.panel.active{ display:block; }

input,select{
  padding:6px;
  margin:4px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #333;
  padding:6px;
  text-align:center;
}

.small{
  font-size:12px;
  opacity:.95;
}

.ok{ color:#b7ffb7; }
.err{ color:#ffb3b3; }

</style>
</head>

<body>

<h2>🏁 Control Rally V1</h2>

<div class="menu">
<button class="btn" onclick="mostrarPanel('crearRally')">Crear Rally</button>
<button class="btn" onclick="mostrarPanel('inscritos')">Inscritos</button>
<button class="btn" onclick="mostrarPanel('tiempos')">Tiempos</button>
<button class="btn" onclick="mostrarPanel('ch')">CH</button>
</div>


<!-- ================= CREAR RALLY ================= -->

<div id="crearRally" class="panel">

<h3>Crear Rally</h3>

ID Rally:
<input id="nuevoID">

Nº Tramos:
<input id="numTramos" type="number" min="1" value="1">

<button class="btn" onclick="crearRally()">Confirmar</button>

<div id="estadoRally" class="small"></div>

</div>



<!-- ================= INSCRITOS ================= -->

<div id="inscritos" class="panel">

<h3>Inscritos</h3>

ID:
<select id="idInscritos"></select>

Buscar dorsal:
<input id="buscarDorsal" oninput="filtrarInscritos()">

<br><br>

Nº <input id="i_num" size="4">
Equipo <input id="i_equ">
Piloto <input id="i_pil">
Copiloto <input id="i_cop">
Vehículo <input id="i_veh">

<br><br>

Grupo <input id="i_gru" size="6">
Clase <input id="i_cla" size="6">
Categoría <input id="i_cat" size="6">
Agrupación <input id="i_agr" size="6">
Copa <input id="i_copa" size="6">

<br><br>

<button class="btn" onclick="guardarInscrito()">Guardar</button>

<span id="estadoInscritos" class="small"></span>


<table id="tablaInscritos">

<thead>

<tr>
<th>Nº</th>
<th>Equipo</th>
<th>Piloto</th>
<th>Copiloto</th>
<th>Vehículo</th>
<th>Grupo</th>
<th>Clase</th>
<th>Categoría</th>
<th>Agrupación</th>
<th>Copa</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>



<!-- ================= TIEMPOS ================= -->

<div id="tiempos" class="panel active">

<h3>Tiempos</h3>

ID:
<select id="selectorID"></select>

<div id="tcButtons"></div>
<div id="tcCards"></div>

<div id="estadoTiempos" class="small"></div>

</div>



<!-- ================= CH ================= -->

<div id="ch" class="panel">

<h3>CH</h3>

ID:
<select id="selectorID_CH"></select>

CH:
<select id="selectorCH">
<option value="TODOS">TODOS</option>
</select>

<table id="tablaCH">

<thead>
<tr>
<th>CH</th>
<th>Nº</th>
<th>Hora</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>




<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyBwmQakDh0mTs9QFq135I8LD1vG0-FNVo0",
authDomain: "heideggerp6v2.firebaseapp.com",
databaseURL: "https://heideggerp6v2-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "heideggerp6v2",
storageBucket: "heideggerp6v2.appspot.com",
messagingSenderId: "186503733",
appId: "1:186503733:web:ac4e03f579a8e101f5177c"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const $ = id => document.getElementById(id);

window.mostrarPanel = function(id){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");

};



/* ================= CREAR RALLY ================= */

window.crearRally = async function(){

const id = $("nuevoID").value.trim();
const num = parseInt($("numTramos").value);

if(!id || !num) return;

const refID = ref(db,"IDs/"+id);
const snap = await get(refID);

if(snap.exists()){
alert("Ese ID ya existe");
return;
}

await set(refID,{creado:Date.now()});

const tramos={};

tramos["TC0"]={puestos:{}};

for(let ch=0;ch<=15;ch++){

tramos["TC0"].puestos["CH"+ch]={tiempos:{}};

}

for(let i=1;i<=num;i++){

tramos["TC"+i]={

puestos:{
S:{tiempos:{}},
LL:{tiempos:{}}
}

};

}

await update(refID,{tramos});

$("estadoRally").innerText="Rally creado";

};



/* ================= INSCRITOS ================= */

window.guardarInscrito = async function(){

const id = $("idInscritos").value;
const num = $("i_num").value.trim();

if(!id || !num){
alert("Falta ID o Nº");
return;
}

const data={

equipo:$("i_equ").value,
piloto:$("i_pil").value,
copiloto:$("i_cop").value,
vehiculo:$("i_veh").value,

grupo:$("i_gru").value,
clase:$("i_cla").value,
categoria:$("i_cat").value,
agrupacion:$("i_agr").value,
copa:$("i_copa").value

};

await set(ref(db,`IDs/${id}/inscritos/${num}`),data);

$("estadoInscritos").innerText="Guardado";

};

const d=inscritosCache[num]||{};

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${num}</td>

<td>${d.piloto||""}</td>
<td>${d.copiloto||""}</td>
<td>${d.vehiculo||""}</td>
<td>${d.grupo||""}</td>
<td>${d.clase||""}</td>
<td>${d.categoria||""}</td>
<td>${d.agrupacion||""}</td>
<td>${d.copa||""}</td>

tbody.appendChild(tr);

}



</script>

</body>
</html>
